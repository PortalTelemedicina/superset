  ptm_bar_radius_round_bottom: true
  ptm_zoom_enabled: true
  ptm_zoom_axis: x
  ptm_zoom_size: xs
  ptm_zoom_inset: '24'
  viz_type: ptm_echarts_timeseries
  datasource: '{dataset_id}__table'
