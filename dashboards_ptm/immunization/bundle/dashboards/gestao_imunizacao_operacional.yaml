metadata:
  color_scheme: supersetColors
  refresh_frequency: 300
  cross_filters_enabled: true
  native_filter_configuration:
  - id: NATIVE_FILTER-municipality
    name: Município (IBGE)
    filterType: filter_select
    targets:
    - column:
        name: municipality_code
    defaultDataMask:
      filterState:
        value:
        - '220850'
    controlValues:
      multiSelect: true
      enableEmptyFilter: false
      inverseSelection: false
      searchAllOptions: true
    type: NATIVE_FILTER
  - id: NATIVE_FILTER-vaccine
    name: Vacina
    filterType: filter_select
    targets:
    - column:
        name: vaccine_code
    controlValues:
      multiSelect: true
      enableEmptyFilter: false
    type: NATIVE_FILTER
  - id: NATIVE_FILTER-dose
    name: Dose
    filterType: filter_select
    targets:
    - column:
        name: dose_sequence
    controlValues:
      multiSelect: true
      enableEmptyFilter: false
    type: NATIVE_FILTER
  - id: NATIVE_FILTER-ref-date
    name: Período
    filterType: filter_time
    targets:
    - {}
    defaultDataMask:
      filterState:
        value: Last year
    type: NATIVE_FILTER
  chart_configuration: {}
  global_chart_configuration:
    scope:
      rootPath:
      - ROOT_ID
      excluded: []
    chartsInScope: []
  ptm_autoconvert: true
tags:
- name: PTM
version: 1.0.0
