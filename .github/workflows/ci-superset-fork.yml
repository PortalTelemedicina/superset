name: Build & Deploy Superset Fork

on:
  push:
    branches:
      - "5.0"
      - "6.0"

env:
  REFERENCE: ${{ github.head_ref || github.ref_name }}
  REGISTRY: us.gcr.io
  PROJECT_ID: ptm-devops
  IMAGE_NAME: superset-fork
  COMMIT_SHA: ${{ github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  Tag:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set image tag
        id: set_tag
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

  sast:
    needs: Tag
    uses: PortalTelemedicina/ptm-security/.github/workflows/sast-template.yaml@development
    with:
      ignored_paths: "**/tests/**,**/superset/translations/**,**/superset-frontend/node_modules/**,**/docs/**"

  build-and-push:
    needs: [Tag, sast]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      image_tag: ${{ needs.Tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCR_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: |
          gcloud --quiet auth configure-docker

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ needs.Tag.outputs.image_tag }}" \
            --build-arg GITHUB_SHA="${{ github.sha }}" \
            --build-arg GITHUB_REF="${{ github.ref }}" \
            --target lean \
            .

      - name: Push Docker image to GCR
        run: |
          docker push "${{ needs.Tag.outputs.image_tag }}"

      - name: Print docker stats
        run: |
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "IMAGE: ${{ needs.Tag.outputs.image_tag }}"
          docker images "${{ needs.Tag.outputs.image_tag }}"

  trigger-custom-image:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to superset-custom-image repository
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/PortalTelemedicina/superset-custom-image/dispatches \
            -d '{
              "event_type": "superset-fork-updated",
              "client_payload": {
                "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
                "commit_sha": "${{ github.sha }}",
                "branch": "${{ github.ref_name }}"
              }
            }')
          
          if [[ "$HTTP_STATUS" -ne 204 ]]; then
            echo "❌ Error: Failed to dispatch event. HTTP Status: $HTTP_STATUS"
            cat /tmp/response.txt
            exit 1
          fi
          
          echo "✅ Repository dispatch sent successfully (HTTP $HTTP_STATUS)"

      - name: Log dispatch event
        run: |
          echo "✅ Repository dispatch sent to superset-custom-image"
          echo "Event type: superset-fork-updated"
          echo "Payload:"
          echo "  - image_tag: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "  - commit_sha: ${{ github.sha }}"
          echo "  - branch: ${{ github.ref_name }}"
